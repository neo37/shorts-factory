# GitLab CI/CD for VideoBot.
# GitHub stays primary; GitLab is a mirror and this pipeline only DEPLOYS to the server.
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   SSH_PRIVATE_KEY  (type: File or masked var; the gitlab-ci-deploy private key)
#   SSH_HOST         = 144.91.83.27
#   SSH_USER         = root
#   DEPLOY_DIR       = /opt/openmontage/videobot   (optional; default below)
#
# Flow: `test` runs automatically on every push; `deploy` is MANUAL (run from the
# GitLab Pipelines UI) and only on the default branch.

stages:
  - test
  - deploy

variables:
  DEPLOY_DIR: "/opt/openmontage/videobot"

test:
  stage: test
  image: python:3.12-slim
  script:
    - python -m venv .venv
    - . .venv/bin/activate
    - pip install -q --upgrade pip
    - pip install -q -r requirements.txt
    - export CELERY_TASK_ALWAYS_EAGER=1
    - |
      python - <<'PY'
      import app, app.api, app.admin, app.tasks, app.render, app.llm, app.tts, app.asr, app.site
      import bots.handlers, bots.runner, bots.keyboards, bots.texts, bots.notify
      from app import create_app
      a = create_app(); c = a.test_client()
      assert c.get('/').status_code == 200, 'landing failed'
      assert c.get('/openapi.json').status_code == 200, 'openapi failed'
      assert c.post('/v1/chat/completions').status_code == 401, 'auth guard failed'
      print('smoke OK')
      PY
  rules:
    - if: '$CI_PIPELINE_SOURCE == "push"'
    - if: '$CI_PIPELINE_SOURCE == "web"'

deploy:
  stage: deploy
  image: alpine:3.20
  needs: ["test"]
  when: manual                       # deploy is triggered by a button in the UI
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
  before_script:
    - apk add --no-cache openssh-client
    - mkdir -p ~/.ssh && chmod 700 ~/.ssh
    - echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_ed25519 && chmod 600 ~/.ssh/id_ed25519
    - ssh-keyscan -H "$SSH_HOST" >> ~/.ssh/known_hosts 2>/dev/null
  script:
    - |
      ssh -i ~/.ssh/id_ed25519 "$SSH_USER@$SSH_HOST" bash -s <<EOF
      set -e
      cd "$DEPLOY_DIR"
      git pull --ff-only
      .venv/bin/pip install -q -r requirements.txt
      .venv/bin/python -c "from app import create_app; from app.models import db; a=create_app();
      import contextlib
      with a.app_context(): db.create_all()"
      systemctl restart videobot-web videobot-worker videobot-bots
      sleep 4
      for s in videobot-web videobot-worker videobot-bots; do systemctl is-active \$s; done
      EOF
  environment:
    name: production
    url: https://videos.ai3d.art
