<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>VideoBot · Shorts из промта</title>
<meta name="description" content="Telegram-бот, который превращает промт в брендированный вертикальный Shorts. / A Telegram bot that turns a prompt into a branded vertical Short.">
<link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/swagger-ui-dist@5/swagger-ui.css">
<style>
  :root{
    --bg:#000;--panel:#141414;--panel2:#1c1c1e;--primary:#7C88FC;--accent:#FF8562;
    --fg:#fff;--fg2:rgba(255,255,255,.72);--muted:rgba(255,255,255,.52);--border:rgba(255,255,255,.08);
    --font:"Manrope",system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html{scroll-behavior:smooth}
  body{background:var(--bg);color:var(--fg);font-family:var(--font);line-height:1.5;overflow-x:hidden}
  a{color:inherit;text-decoration:none}
  .wrap{max-width:1080px;margin:0 auto;padding:0 24px}
  .glow{position:fixed;inset:-30% -10% auto -10%;height:70vh;pointer-events:none;z-index:0;
    background:radial-gradient(60% 60% at 30% 20%,rgba(124,136,252,.20),transparent 70%),
               radial-gradient(50% 50% at 80% 10%,rgba(255,133,98,.14),transparent 70%);filter:blur(10px)}
  header{position:sticky;top:0;z-index:10;backdrop-filter:blur(12px);background:rgba(0,0,0,.55);border-bottom:1px solid var(--border)}
  .nav{display:flex;align-items:center;justify-content:space-between;height:68px}
  .brand{font-weight:800;letter-spacing:-.02em;font-size:22px}
  .brand b{color:var(--primary)}
  .lang{display:flex;gap:6px;background:var(--panel);border:1px solid var(--border);border-radius:999px;padding:4px}
  .lang button{font-family:inherit;font-weight:700;font-size:14px;color:var(--muted);background:none;border:0;padding:7px 14px;border-radius:999px;cursor:pointer}
  .lang button.on{background:var(--primary);color:#0B0D2A}
  section{position:relative;z-index:1}
  .hero{padding:96px 0 72px;text-align:center}
  .eyebrow{font-weight:700;text-transform:uppercase;letter-spacing:.16em;font-size:14px;color:var(--accent)}
  h1{font-weight:800;letter-spacing:-.03em;font-size:clamp(40px,7vw,84px);line-height:1.04;margin:20px 0 0}
  h1 .p{color:var(--primary)}
  .sub{font-size:clamp(17px,2.4vw,23px);color:var(--fg2);max-width:640px;margin:26px auto 0}
  .cta{display:flex;gap:14px;justify-content:center;flex-wrap:wrap;margin-top:40px}
  .btn{font-weight:800;font-size:18px;padding:18px 34px;border-radius:999px;cursor:pointer;border:0;font-family:inherit}
  .btn.primary{background:var(--primary);color:#0B0D2A}
  .btn.ghost{background:var(--panel);color:var(--fg);border:1px solid var(--border)}
  .note{margin-top:18px;font-size:15px;color:var(--muted)}
  h2{font-weight:800;letter-spacing:-.02em;font-size:clamp(28px,4vw,44px);text-align:center;margin-bottom:14px}
  .lead{text-align:center;color:var(--fg2);max-width:640px;margin:0 auto 46px}
  .block{padding:72px 0}
  .grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(260px,1fr));gap:20px}
  .card{background:var(--panel);border:1px solid var(--border);border-radius:22px;padding:30px}
  .card .ic{font-size:34px}
  .card h3{font-size:22px;font-weight:800;margin:16px 0 8px;letter-spacing:-.01em}
  .card p{color:var(--fg2);font-size:16px}
  .steps{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:20px;counter-reset:s}
  .step{background:var(--panel);border:1px solid var(--border);border-radius:22px;padding:28px;position:relative}
  .step:before{counter-increment:s;content:counter(s);position:absolute;top:-16px;left:24px;width:44px;height:44px;display:grid;place-items:center;background:var(--primary);color:#0B0D2A;font-weight:800;border-radius:12px;font-size:20px}
  .step h3{margin:14px 0 6px;font-size:19px}
  .step p{color:var(--fg2);font-size:15px}
  .price{max-width:560px;margin:0 auto;background:linear-gradient(180deg,var(--panel2),var(--panel));border:1px solid var(--border);border-radius:26px;padding:44px;text-align:center}
  .price .big{font-weight:800;font-size:64px;letter-spacing:-.03em}
  .price .big span{color:var(--primary)}
  .price ul{list-style:none;margin:26px 0 0;text-align:left;display:inline-block}
  .price li{padding:8px 0;color:var(--fg2);font-size:17px}
  .price li:before{content:"✓ ";color:var(--primary);font-weight:800}
  /* API + swagger */
  .apibox{background:var(--panel);border:1px solid var(--border);border-radius:22px;padding:14px}
  .swagger-ui{background:transparent}
  #swagger{background:#fff;border-radius:16px;overflow:hidden}
  .endpoints{display:flex;flex-wrap:wrap;gap:10px;justify-content:center;margin-bottom:30px}
  .ep{font-family:ui-monospace,Menlo,monospace;font-size:14px;background:var(--panel);border:1px solid var(--border);border-radius:999px;padding:10px 16px;color:var(--fg2)}
  .ep b{color:var(--primary)}
  /* modal */
  .modal{position:fixed;inset:0;z-index:50;display:none;align-items:flex-start;justify-content:center;background:rgba(0,0,0,.7);overflow-y:auto;padding:5vh 16px}
  .modal.open{display:flex}
  .form{width:100%;max-width:560px;background:var(--panel);border:1px solid var(--border);border-radius:22px;padding:30px}
  .form h3{font-size:24px;font-weight:800;letter-spacing:-.02em}
  .form .fsub{color:var(--fg2);margin-top:6px;font-size:15px}
  .form label.req{display:block;font-weight:700;margin:22px 0 8px}
  .form input[type=text]{width:100%;background:#0e0e0e;border:1px solid var(--border);border-radius:12px;padding:14px 16px;color:var(--fg);font-family:inherit;font-size:16px}
  .grouph{font-weight:700;margin:22px 0 10px;color:var(--fg2);font-size:13px;text-transform:uppercase;letter-spacing:.1em}
  .checks{display:grid;grid-template-columns:1fr 1fr;gap:8px 18px}
  .chk{display:flex;align-items:center;gap:10px;font-size:15px;color:var(--fg2);cursor:pointer}
  .chk input{width:18px;height:18px;accent-color:var(--primary)}
  .form .row{display:flex;gap:12px;margin-top:26px}
  .form .msg{margin-top:14px;font-size:15px;min-height:20px}
  .form .msg.ok{color:var(--primary)} .form .msg.err{color:var(--accent)}
  .x{background:none;border:0;color:var(--muted);font-size:26px;cursor:pointer;float:right;line-height:1}
  footer{border-top:1px solid var(--border);padding:48px 0;text-align:center;color:var(--muted);font-size:15px}
  footer a{color:var(--primary);font-weight:700}
  .foot-links{display:flex;gap:22px;justify-content:center;flex-wrap:wrap;margin-bottom:14px}
</style>
</head>
<body>
<div class="glow"></div>

<header><div class="wrap nav">
  <div class="brand">video<b>bot</b></div>
  <div class="lang" id="lang"><button data-lang="en">EN</button><button data-lang="ru">RU</button></div>
</div></header>

<section class="hero"><div class="wrap">
  <div class="eyebrow" data-i18n="hero_eyebrow"></div>
  <h1 data-i18n-html="hero_title"></h1>
  <p class="sub" data-i18n="hero_sub"></p>
  <div class="cta">
    <a class="btn primary" href="{{ topup_url }}" data-i18n="cta_start"></a>
    <a class="btn ghost" href="#how" data-i18n="cta_how"></a>
  </div>
  <div class="note" data-i18n="hero_note"></div>
</div></section>

<section class="block"><div class="wrap">
  <h2 data-i18n="feat_h"></h2><p class="lead" data-i18n="feat_lead"></p>
  <div class="grid">
    <div class="card"><div class="ic">⚡</div><h3 data-i18n="f1_h"></h3><p data-i18n="f1_p"></p></div>
    <div class="card"><div class="ic">🎨</div><h3 data-i18n="f2_h"></h3><p data-i18n="f2_p"></p></div>
    <div class="card"><div class="ic">🖼️</div><h3 data-i18n="f3_h"></h3><p data-i18n="f3_p"></p></div>
    <div class="card"><div class="ic">🗣️</div><h3 data-i18n="f4_h"></h3><p data-i18n="f4_p"></p></div>
    <div class="card"><div class="ic">🔁</div><h3 data-i18n="f5_h"></h3><p data-i18n="f5_p"></p></div>
    <div class="card"><div class="ic">🔌</div><h3 data-i18n="f6_h"></h3><p data-i18n="f6_p"></p></div>
  </div>
</div></section>

<section class="block" id="how" style="background:#0a0a0a"><div class="wrap">
  <h2 data-i18n="how_h"></h2><p class="lead" data-i18n="how_lead"></p>
  <div class="steps">
    <div class="step"><h3 data-i18n="s1_h"></h3><p data-i18n="s1_p"></p></div>
    <div class="step"><h3 data-i18n="s2_h"></h3><p data-i18n="s2_p"></p></div>
    <div class="step"><h3 data-i18n="s3_h"></h3><p data-i18n="s3_p"></p></div>
    <div class="step"><h3 data-i18n="s4_h"></h3><p data-i18n="s4_p"></p></div>
  </div>
</div></section>

<section class="block"><div class="wrap">
  <h2 data-i18n="price_h"></h2><p class="lead" data-i18n="price_lead"></p>
  <div class="price">
    <div class="big" data-i18n-html="price_big"></div>
    <ul>
      <li data-i18n="price_1"></li><li data-i18n="price_2"></li>
      <li data-i18n="price_3"></li><li data-i18n="price_4"></li>
    </ul>
    <div class="cta" style="margin-top:34px">
      <a class="btn primary" href="{{ topup_url }}" data-i18n="cta_topup"></a>
    </div>
  </div>
</div></section>

<!-- ===== API + Swagger ===== -->
<section class="block" id="api" style="background:#0a0a0a"><div class="wrap">
  <h2 data-i18n="api_h"></h2>
  <p class="lead" data-i18n="api_lead"></p>
  <div class="endpoints">
    <span class="ep"><b>POST</b> /v1/chat/completions</span>
    <span class="ep"><b>POST</b> /v1/audio/speech</span>
    <span class="ep"><b>POST</b> /v1/audio/transcriptions</span>
    <span class="ep"><b>GET</b> /v1/models</span>
  </div>
  <div class="cta" style="margin-top:0;margin-bottom:34px">
    <button class="btn primary" id="openForm" data-i18n="api_btn"></button>
  </div>
  <div class="apibox"><div id="swagger"></div></div>
</div></section>

<!-- ===== lead form modal ===== -->
<div class="modal" id="modal"><div class="form">
  <button class="x" id="closeForm">&times;</button>
  <h3 data-i18n="form_title"></h3>
  <p class="fsub" data-i18n="form_sub"></p>

  <label class="req" data-i18n="form_contact"></label>
  <input type="text" id="contact" data-i18n-ph="form_contact_ph">

  <div class="grouph" data-i18n="form_services"></div>
  <div class="checks" id="services"></div>

  <div class="grouph" data-i18n="form_models"></div>
  <div class="checks" id="models"></div>

  <label class="req" data-i18n="form_note"></label>
  <input type="text" id="note" data-i18n-ph="form_note_ph">

  <div class="row">
    <button class="btn primary" id="sendForm" style="flex:1" data-i18n="form_send"></button>
  </div>
  <div class="msg" id="formMsg"></div>
</div></div>

<footer><div class="wrap">
  <div class="foot-links">
    <a href="{{ footer_url }}">videos.ai3d.art</a>
    <a href="{{ topup_url }}" data-i18n="foot_contact"></a>
    <a href="/admin2/" data-i18n="foot_admin"></a>
  </div>
  <div data-i18n="foot_by"></div>
</div></footer>

<script src="https://unpkg.com/swagger-ui-dist@5/swagger-ui-bundle.js"></script>
<script>
// service checkboxes: [id, label, defaultChecked]
const SERVICES = [
  ["shorts", "Shorts generator", true],
  ["api_llm", "API: LLM (chat)", true],
  ["api_tts", "API: TTS (voice)", false],
  ["api_asr", "API: ASR (speech-to-text)", false],
];
// LLM model interest — paid/cloud + open + uncensored (uncensored default OFF)
const MODELS = [
  ["gpt", "OpenAI GPT", false], ["claude", "Anthropic Claude", false],
  ["gemini", "Google Gemini", false], ["grok", "xAI Grok", false],
  ["mistral", "Mistral", false], ["deepseek", "DeepSeek", false],
  ["llama", "Llama 3.1 (open)", false], ["qwen", "Qwen2.5 (open)", false],
  ["gemma", "Gemma 2 (open)", false], ["mixtral", "Mixtral (open)", false],
  ["u_dolphin", "Dolphin-Mistral (uncensored)", false],
  ["u_qwen_abl", "Qwen2.5-Abliterated (uncensored)", false],
  ["u_llama_abl", "Llama-3.1-Abliterated (uncensored)", false],
  ["u_hermes", "Nous-Hermes (uncensored)", false],
];
function buildChecks(hostId, defs){
  const host = document.getElementById(hostId);
  host.innerHTML = defs.map(([id,label,on])=>
    `<label class="chk"><input type="checkbox" value="${label}" ${on?"checked":""}> ${label}</label>`).join("");
}
buildChecks("services", SERVICES);
buildChecks("models", MODELS);

const I18N = {
  en: {
    hero_eyebrow:"AI Shorts factory · Telegram",
    hero_title:'Turn a prompt into a <span class="p">branded Short</span>',
    hero_sub:"Describe a topic in a Telegram bot — get a storyboard, a voice-over draft, and a finished vertical video in your brand style. Refine in a loop, approve, download.",
    cta_start:"Start in Telegram", cta_how:"How it works",
    hero_note:"100 free credits for new users · 1 video = 1 credit",
    feat_h:"Everything to ship Shorts at scale",
    feat_lead:"One bot = one design style. Bring your own photos and videos, or mix in stock.",
    f1_h:"Text or voice prompt", f1_p:"Type a prompt or send a voice message — it becomes a structured storyboard, captions and narration automatically.",
    f2_h:"Your brand style", f2_p:"Every render follows a fixed design preset. Consistent, recognizable, on-brand.",
    f3_h:"Your media", f3_p:"Attach photos and videos. Use your own footage, external stock, or a mix — grouped by project.",

    s1_h:"Send a prompt", s1_p:"Describe your topic in the bot and (optionally) attach media.",
    s2_h:"Get a storyboard", s2_p:"Scenes, captions and a narration draft come back in seconds.",
    s3_h:"Refine", s3_p:"Amend as many times as you like — corrections are free.",
    s4_h:"Approve & render", s4_p:"The finished vertical video is delivered right in the chat.",
    price_h:"Simple pricing", price_lead:"Start free. Top up when you're ready to remove the watermark.",
    price_big:'500 ₽ = <span>5 videos</span>',
    price_1:"100 free credits on sign-up", price_2:"1 video = 1 credit · edits are free",
    price_3:"Watermark removed after top-up", price_4:"Manual top-up via Telegram",
    cta_topup:"Top up via Telegram",
    api_h:"Developer API", api_lead:"OpenAI-compatible endpoints for LLM chat, text-to-speech and speech-to-text. Authenticate with a Bearer key. Explore the full spec below.",
    api_btn:"Request API keys",
    form_title:"Request API keys", form_sub:"Leave a contact and pick what you need — we'll get back to you.",
    form_contact:"Contact *", form_contact_ph:"Telegram / email / phone",
    form_services:"What do you want", form_models:"LLM models of interest",
    form_note:"Note", form_note_ph:"Anything else (optional)",
    form_send:"Send request", form_ok:"Thanks! We'll contact you soon.", form_err:"Please enter a contact.",
    foot_contact:"Contact / top-up", foot_admin:"Admin", foot_by:"Made for videos.ai3d.art · author Vasily Kiselev",
  },
  ru: {
    hero_eyebrow:"Фабрика AI-Shorts · Telegram",
    hero_title:'Промт → <span class="p">брендированный Shorts</span>',
    hero_sub:"Опишите тему в Telegram-боте — получите раскадровку, черновик озвучки и готовое вертикальное видео в вашем фирменном стиле. Дорабатывайте в цикле, утверждайте, скачивайте.",
    cta_start:"Начать в Telegram", cta_how:"Как это работает",
    hero_note:"100 бесплатных кредитов новым · 1 видео = 1 кредит",
    feat_h:"Всё, чтобы штамповать Shorts на потоке",
    feat_lead:"Один бот = один стиль. Свои фото и видео — или микс со стоками.",
    f1_h:"Промт текстом или голосом", f1_p:"Напишите промт или отправьте голосовое — оно превратится в раскадровку, субтитры и озвучку автоматически.",
    f2_h:"Ваш фирменный стиль", f2_p:"Каждый рендер следует фиксированному пресету. Узнаваемо и в бренде.",

    f6_h:"API для разработчиков", f6_p:"OpenAI-совместимые эндпоинты для чата, озвучки и распознавания — для внешних проектов.",
    how_h:"От идеи до Shorts за 4 шага", how_lead:"Вы контролируете каждый шаг.",
    s1_h:"Отправьте промт", s1_p:"Опишите тему в боте и (по желанию) приложите медиа.",
    s2_h:"Получите раскадровку", s2_p:"Сцены, субтитры и черновик озвучки — за секунды.",
    s3_h:"Дорабатывайте", s3_p:"Правьте сколько угодно — корректировки бесплатны.",
    s4_h:"Утвердите и рендерьте", s4_p:"Готовое вертикальное видео прилетает прямо в чат.",
    price_h:"Простые цены", price_lead:"Старт бесплатно. Пополняйте, когда готовы убрать watermark.",
    price_big:'500 ₽ = <span>5 видео</span>',
    price_1:"100 бесплатных кредитов при старте", price_2:"1 видео = 1 кредит · правки бесплатны",
    price_3:"Watermark убирается после пополнения", price_4:"Ручное пополнение через Telegram",
    cta_topup:"Пополнить через Telegram",
    api_h:"API для разработчиков", api_lead:"OpenAI-совместимые эндпоинты: LLM-чат, синтез речи и распознавание речи. Авторизация по Bearer-ключу. Полная спецификация ниже.",
    api_btn:"Запросить ключи для API",
    form_title:"Запросить ключи для API", form_sub:"Оставьте контакт и отметьте, что нужно — мы свяжемся с вами.",
    form_contact:"Контакт *", form_contact_ph:"Telegram / email / телефон",
    form_services:"Что заказываете", form_models:"Интересующие LLM-модели",
    form_note:"Комментарий", form_note_ph:"Что-то ещё (необязательно)",
    form_send:"Отправить заявку", form_ok:"Спасибо! Мы свяжемся с вами.", form_err:"Укажите контакт.",
    foot_contact:"Связаться / пополнить", foot_admin:"Админка", foot_by:"Сделано для videos.ai3d.art · автор Василий Киселёв",
  }
};

function applyLang(lang){
  const d = I18N[lang] || I18N.en;
  document.documentElement.lang = lang;
  document.querySelectorAll("[data-i18n]").forEach(el=>{const k=el.getAttribute("data-i18n"); if(d[k]!=null) el.textContent=d[k];});
  document.querySelectorAll("[data-i18n-html]").forEach(el=>{const k=el.getAttribute("data-i18n-html"); if(d[k]!=null) el.innerHTML=d[k];});
  document.querySelectorAll("[data-i18n-ph]").forEach(el=>{const k=el.getAttribute("data-i18n-ph"); if(d[k]!=null) el.placeholder=d[k];});
  document.querySelectorAll("#lang button").forEach(b=>b.classList.toggle("on", b.dataset.lang===lang));
  try{localStorage.setItem("vb_lang",lang);}catch(e){}
}
function detectLang(){
  try{const s=localStorage.getItem("vb_lang"); if(s) return s;}catch(e){}
  for(const l of (navigator.languages||[navigator.language||"en"])){ if((l||"").toLowerCase().startsWith("ru")) return "ru"; }
  return "en";
}
document.querySelectorAll("#lang button").forEach(b=>b.addEventListener("click",()=>applyLang(b.dataset.lang)));
applyLang(detectLang());

// modal
const modal=document.getElementById("modal");
document.getElementById("openForm").addEventListener("click",()=>modal.classList.add("open"));
document.getElementById("closeForm").addEventListener("click",()=>modal.classList.remove("open"));
modal.addEventListener("click",e=>{ if(e.target===modal) modal.classList.remove("open"); });
document.getElementById("sendForm").addEventListener("click",()=>{
  const lang=document.documentElement.lang, d=I18N[lang]||I18N.en;
  const contact=document.getElementById("contact").value.trim();
  const msg=document.getElementById("formMsg");
  if(!contact){ msg.className="msg err"; msg.textContent=d.form_err; return; }
  const items=[...document.querySelectorAll("#services input:checked, #models input:checked")].map(i=>i.value);
  fetch("/request-keys",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({contact,items,note:document.getElementById("note").value})})
   .then(r=>r.json()).then(x=>{
     if(x.ok){ msg.className="msg ok"; msg.textContent=d.form_ok; setTimeout(()=>modal.classList.remove("open"),1800); }
     else { msg.className="msg err"; msg.textContent=x.error||d.form_err; }
   }).catch(()=>{ msg.className="msg err"; msg.textContent="error"; });
});

// swagger
if(window.SwaggerUIBundle){
  SwaggerUIBundle({url:"/openapi.json", domNode:document.getElementById("swagger"),
    presets:[SwaggerUIBundle.presets.apis], layout:"BaseLayout", defaultModelsExpandDepth:-1});
}
</script>
